name: Deploy to GitHub Pages
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # принудительный Node.js 24

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}" ]; then echo "Secret VITE_EMAILJS_PUBLIC_KEY not set!" && exit 1; fi
          if [ -z "${{ secrets.VITE_EMAILJS_SERVICE_ID }}" ]; then echo "Secret VITE_EMAILJS_SERVICE_ID not set!" && exit 1; fi
          # проверьте все секреты

      - name: Create .env file with secrets
        run: |
          echo "VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}" >> .env
          echo "VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}" >> .env
          echo "VITE_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}" >> .env
          echo "VITE_ADMIN_EMAIL=${{ secrets.VITE_ADMIN_EMAIL }}" >> .env

      - name: Install dependencies and build
        run: |
          npm ci || exit 1
          npm run build || exit 1
        env:
          CI: true

      - name: Check dist folder
        run: ls dist/ || exit 1

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v5
        with:
          folder: dist
          branch: gh-pages
